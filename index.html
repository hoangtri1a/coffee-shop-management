<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINO COFFEE - ONLINE POS</title>
    <style>
        :root {
            --primary-color: #6F4E37;
            --secondary-color: #ECE0D1;
            --dark-color: #3D2314;
            --success-color: #2ec4b6;
            --danger-color: #e71d36;
            --active-color: #ff9f1c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f7f5f0;
            color: var(--dark-color);
            padding: 10px;
        }

        header {
            text-align: center;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .revenue-box {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 6px;
            border-radius: 5px;
            margin-top: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .status-online {
            font-size: 0.8rem;
            color: #2ec4b6;
            font-weight: normal;
            display: block;
            margin-top: 3px;
        }

        /* THANH MENU TABS */
        .tab-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab-nav-btn {
            padding: 12px;
            background-color: #e0dbd5;
            border: none;
            font-weight: bold;
            color: var(--dark-color);
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            text-align: center;
        }

        .tab-nav-btn.active-tab-nav {
            background-color: var(--primary-color);
            color: white;
        }

        .tab-content { display: none; }
        .tab-content.active-tab-view { display: block; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .tables-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .table-btn {
            aspect-ratio: 1;
            border: 2px solid #ddd;
            background-color: #fff;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .table-btn.active-table {
            background-color: var(--active-color);
            color: white;
            border-color: var(--active-color);
        }

        .table-btn.selected-now {
            border: 3px solid var(--dark-color);
            transform: scale(1.05);
        }

        /* Khu vực gọi món */
        .order-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-grow: 1;
            flex-direction: column;
            scroll-margin-top: 10px;
        }

        .takeaway-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
            padding: 10px;
            background-color: #fff5e6;
            border-radius: 6px;
            border: 1px dashed var(--active-color);
            cursor: pointer;
        }

        .takeaway-option input { width: 22px; height: 22px; cursor: pointer; }
        .takeaway-option label { font-weight: bold; cursor: pointer; font-size: 0.95rem; }

        select, .btn-action {
            width: 100%;
            padding: 14px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
            font-weight: bold;
            -webkit-appearance: none;
        }

        .btn-add { background-color: var(--primary-color); color: white; border: none; cursor: pointer; }

        .order-list {
            flex-grow: 1;
            margin-top: 15px;
            max-height: 380px;
            overflow-y: auto;
            border-bottom: 2px dashed #ddd;
            padding-bottom: 10px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .badge-takeaway {
            background-color: var(--danger-color);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-qty {
            width: 32px;
            height: 32px;
            background-color: #e0e0e0;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .total-price { font-size: 1.4rem; font-weight: bold; text-align: right; margin-bottom: 12px; }
        .btn-pay { background-color: var(--success-color); color: white; border: none; font-size: 1.1rem; cursor: pointer; padding: 14px; }

        .card-view {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        .scroll-list { margin-top: 10px; max-height: 400px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .history-item:nth-child(even) { background-color: #fcfbfa; }

        .bill-item {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            background-color: #fff;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 4px solid var(--success-color);
        }

        .bill-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 6px; }
        .bill-details { font-size: 0.85rem; color: #555; padding-left: 5px; line-height: 1.4; }
        .btn-undo { background-color: var(--danger-color); color: white; border: none; padding: 5px 10px; font-size: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Khung hiển thị tổng quan bộ lọc của tháng */
        .month-filter-box {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
            background-color: #fff5e6;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--secondary-color);
        }
        .month-filter-box select { width: auto; margin: 0; padding: 8px 30px 8px 10px; }

        .month-summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .summary-mini-card {
            background: var(--secondary-color);
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        .btn-print-report {
            background-color: #2b2d42;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 15px;
        }

        @media (min-width: 769px) {
            .main-layout { grid-template-columns: 1fr 1fr; }
            .tables-grid { grid-template-columns: repeat(5, 1fr); }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header>
        <h1>TINO COFFEE</h1>
        <div class="revenue-box">
            Doanh thu hôm nay (<span id="today-date">--/--/----</span>): <span id="daily-revenue">0</span>đ
            <span class="status-online" id="net-status">🌐 Đang kết nối dữ liệu đám mây...</span>
        </div>
    </header>

    <div class="tab-bar">
        <button id="nav-pos" class="tab-nav-btn active-tab-nav" onclick="switchTab('pos')">⚡ BÁN HÀNG TIẾP TÂN</button>
        <button id="nav-stats" class="tab-nav-btn" onclick="switchTab('stats')">📊 THỐNG KÊ DOANH THU</button>
    </div>

    <!-- TAB 1: MÀN HÌNH BÁN HÀNG CHÍNH -->
    <div id="tab-pos" class="tab-content active-tab-view">
        <div class="main-layout">
            <div class="tables-section">
                <h3>Sơ đồ bàn (25 bàn)</h3>
                <div class="tables-grid" id="tables-container"></div>
            </div>

            <div class="order-section" id="order-section-panel">
                <h3 id="order-title">Vui lòng chọn bàn...</h3>
                <div id="order-controls" style="display: none;">
                    <div class="menu-selector">
                        <label for="menu-select">Chọn món ăn/nước uống:</label>
                        <select id="menu-select"></select>
                        <div class="takeaway-option" onclick="toggleCheckbox(event)">
                            <input type="checkbox" id="takeaway-checkbox">
                            <label for="takeaway-checkbox">🥡 Mua mang đi (Take-away)</label>
                        </div>
                        <button class="btn-action btn-add" onclick="addItemToTable()">Thêm món vào bàn</button>
                    </div>
                    <h4 style="margin-top: 10px;">Món đã gọi:</h4>
                    <div class="order-list" id="current-order-list"></div>
                    <div class="checkout-box">
                        <div class="total-price">Tổng cộng: <span id="table-total">0</span>đ</div>
                        <button class="btn-action btn-pay" onclick="checkoutTable()">Thanh Toán & Trả Bàn</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TAB 2: MÀN HÌNH THỐNG KÊ THEO LỊCH THÁNG DƯƠNG LỊCH CỤ THỂ -->
    <div id="tab-stats" class="tab-content">
        
        <!-- KHUNG BỘ LỌC THÁNG LỊCH TRỰC QUAN -->
        <div class="month-filter-box">
            <label style="font-weight:bold;">📅 Chọn Tháng Đối Soát:</label>
            <select id="report-month-select" onchange="onMonthFilterChange()">
                <!-- Các tháng tự động sinh ở đây -->
            </select>
        </div>

        <!-- THẺ THÔNG SỐ TỔNG KẾT THEO THÁNG -->
        <div class="month-summary-grid">
            <div class="summary-mini-card" style="color:var(--primary-color);">
                <div>Doanh Thu Tháng</div>
                <span id="month-total-money" style="font-size:1.3rem;">0</span>đ
            </div>
            <div class="summary-mini-card" style="color:var(--dark-color);">
                <div>Tổng Số Bàn Đã Bán</div>
                <span id="month-total-bills" style="font-size:1.3rem;">0</span> bàn
            </div>
        </div>

        <button class="btn-print-report" onclick="printFilteredReport()">🖨️ XUẤT BÁO CÁO THỜI GIAN ĐANG CHỌN</button>

        <div class="card-view">
            <h3>Danh sách hóa đơn chi tiết trong tháng</h3>
            <div class="scroll-list" id="recent-bills-container"></div>
        </div>
        <div class="card-view">
            <h3>Lịch sử doanh thu từng ngày</h3>
            <div class="scroll-list" id="history-container"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClUxh49lSWRbOj_tZvU-BAWmUHZDRhTYE",
            authDomain: "tino-coffee.firebaseapp.com",
            databaseURL: "https://tino-coffee-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tino-coffee",
            storageBucket: "tino-coffee.firebasestorage.app",
            messagingSenderId: "323694911796",
            appId: "1:323694911796:web:1f73ff694c90044aae8561"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const menuData = [
            { category: "CÀ PHÊ", items: [
                { id: "cf_den_phin", name: "Cafe Đen (Phin)", price: 15000 }, { id: "cf_sua_phin", name: "Cafe Sữa (Phin)", price: 17000 },
                { id: "cf_den_may", name: "Cafe Đen Máy", price: 17000 }, { id: "cf_sua_may", name: "Cafe Sữa Máy", price: 20000 },
                { id: "cf_den_sg", name: "Cafe Đen Sài Gòn", price: 22000 }, { id: "cf_sua_sg", name: "Cafe Sữa Sài Gòn", price: 25000 },
                { id: "bac_xiu", name: "Bạc Xỉu", price: 25000 }, { id: "bac_xiu_muoi", name: "Bạc Xỉu Muối", price: 30000 }, { id: "cf_muoi", name: "Cà Phê Muối", price: 27000 }
            ]},
            { category: "NON-CAFE", items: [
                { id: "cacao_da_nong", name: "Cacao Đá/Nóng", price: 27000 }, { id: "tra_gung", name: "Trà Gừng", price: 25000 }, { id: "cacao_muoi", name: "Cacao Muối", price: 32000 }
            ]},
            { category: "SỮA CHUA", items: [
                { id: "sua_chua_da", name: "Sữa Yogurt Đá", price: 22000 }, { id: "sua_chua_dau", name: "Sữa Chua Dâu", price: 27000 },
                { id: "sua_chua_viet_quat", name: "Sữa Chua Việt Quất", price: 27000 }, { id: "sua_chua_dao", name: "Sữa Chua Đào", price: 27000 }
            ]},
            { category: "NƯỚC GIẢI KHÁT", items: [
                { id: "khoang", name: "Khoáng", price: 15000 }, { id: "khoang_sua", name: "Khoáng Sữa", price: 17000 },
                { id: "sting_vang", name: "Sting Vàng", price: 16000 }, { id: "sting_dau", name: "Sting Dâu", price: 17000 }, { id: "bo_huc", name: "Bò Húc", price: 22000 }
            ]},
            { category: "TRÀ TRÁI CÂY", items: [
                { id: "tra_chanh_dau", name: "Trà Chanh Dâu", price: 25000 }, { id: "tra_dao_tt", name: "Trà Đào Truyền Thống", price: 27000 },
                { id: "tra_chanh_vq", name: "Trà Chanh Việt Quất", price: 25000 }, { id: "tra_chanh_tt", name: "Trà Chanh Truyền Thống", price: 22000 }
            ]},
            { category: "NƯỚC TRÁI CÂY", items: [
                { id: "nuoc_ep_cam", name: "Nước Ép Cam", price: 25000 }, { id: "nuoc_ep_ca_rot", name: "Nước Ép Cà Rốt", price: 25000 },
                { id: "nuoc_ep_thom", name: "Nước Ép Thơm", price: 25000 }, { id: "sinh_to_bo", name: "Sinh Tố Bơ", price: 30000 }, { id: "chanh_tuoi_xi_muoi", name: "Nước Chanh Tươi Xí Muội", price: 22000 }
            ]},
            { category: "ĐÁ XAY", items: [
                { id: "cacao_da_xay", name: "Cacao Đá Xay", price: 32000 }, { id: "da_xay_vq", name: "Đá Xay Việt Quất", price: 32000 }, { id: "da_xay_dau", name: "Đá Xay Dâu", price: 32000 }
            ]}
        ];

        let tables = {};
        let revenueHistory = {};
        let recentBills = [];
        let currentTableId = null;

        function getTodayString() {
            const d = new Date();
            return `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
        }
        const todayStr = getTodayString();

        // LẮNG NGHE ĐỒNG BỘ DỮ LIỆU ĐÁM MÂY
        db.ref('tino_coffee_store').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            let cloudTables = data.tables || {};
            tables = {};
            for (let i = 1; i <= 25; i++) {
                tables[i] = { orderList: [] };
                if (cloudTables[i]) {
                    if (cloudTables[i].orderList) {
                        tables[i].orderList = Array.isArray(cloudTables[i].orderList) 
                            ? cloudTables[i].orderList 
                            : Object.values(cloudTables[i].orderList);
                    }
                }
            }
            
            revenueHistory = data.revenueHistory || {};
            if (!revenueHistory[todayStr]) revenueHistory[todayStr] = 0;
            
            // Nhận tất cả hóa đơn không giới hạn thời gian cũ
            if (data.recentBills) {
                recentBills = Array.isArray(data.recentBills) ? data.recentBills : Object.values(data.recentBills);
                recentBills.forEach(bill => {
                    if (bill.orderList) {
                        bill.orderList = Array.isArray(bill.orderList) ? bill.orderList : Object.values(bill.orderList);
                    }
                });
            } else {
                recentBills = [];
            }

            document.getElementById("net-status").textContent = "💚 Đám mây đồng bộ trực tuyến";
            document.getElementById("net-status").style.color = "#2ec4b6";
            
            renderTables();
            updateRevenueDisplay();
            buildMonthDropdownOptions(); // Tự động sinh danh sách tháng đối soát
            renderFilteredStats(); // Làm mới giao diện thống kê theo tháng đang chọn
            if (currentTableId) renderOrderList();
        }, (error) => {
            document.getElementById("net-status").textContent = "❌ Lỗi kết nối đám mây!";
            document.getElementById("net-status").style.color = "#e71d36";
        });

        function pushDataToCloud() {
            db.ref('tino_coffee_store').set({
                tables: tables,
                revenueHistory: revenueHistory,
                recentBills: recentBills
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("today-date").textContent = todayStr.replace(/-/g, '/');
            initMenuSelect();
        });

        // TỰ ĐỘNG SINH DANH SÁCH CÁC THÁNG CÓ DỮ LIỆU ĐỂ LỌC
        function buildMonthDropdownOptions() {
            const select = document.getElementById("report-month-select");
            const currentSelected = select.value; // Giữ lại lựa chọn cũ khi đám mây cập nhật
            
            // Tìm trọn vẹn tất cả các cặp tháng-năm xuất hiện trong dữ liệu hóa đơn
            let monthsSet = new Set();
            
            // Mặc định luôn add tháng hiện tại vào danh sách chọn
            const d = new Date();
            const currentMonthYearStr = `${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
            monthsSet.add(currentMonthYearStr);

            recentBills.forEach(bill => {
                if (bill.date) {
                    let parts = bill.date.split('-');
                    if (parts.length === 3) {
                        monthsSet.add(`${parts[1]}-${parts[2]}`);
                    }
                }
            });

            // Sắp xếp các tháng từ mới nhất xuống cũ nhất
            let sortedMonths = Array.from(monthsSet).sort((a, b) => {
                let pA = a.split('-'); let pB = b.split('-');
                return new Date(pB[1], pB[0]-1) - new Date(pA[1], pA[0]-1);
            });

            select.innerHTML = "";
            sortedMonths.forEach(m => {
                const opt = document.createElement("option");
                opt.value = m;
                opt.textContent = `Tháng ${m.replace('-', '/')}`;
                select.appendChild(opt);
            });

            if (currentSelected && sortedMonths.includes(currentSelected)) {
                select.value = currentSelected;
            } else {
                select.value = currentMonthYearStr;
            }
        }

        // HÀM LỌC VÀ HIỂN THỊ DỮ LIỆU THEO THÁNG CỤ THỂ
        function renderFilteredStats() {
            const targetMonthYear = document.getElementById("report-month-select").value;
            if (!targetMonthYear) return;

            // 1. Lọc hóa đơn thuộc tháng đang chọn
            let filteredBills = recentBills.filter(bill => {
                if (!bill.date) return false;
                let parts = bill.date.split('-');
                return `${parts[1]}-${parts[2]}` === targetMonthYear;
            });

            // 2. Tính tổng tiền mặt và số lượng bàn của tháng đó
            let totalMoney = filteredBills.reduce((sum, b) => sum + b.total, 0);
            document.getElementById("month-total-money").textContent = totalMoney.toLocaleString('vi-VN');
            document.getElementById("month-total-bills").textContent = filteredBills.length;

            // 3. Đổ danh sách hóa đơn chi tiết vào khung nhìn
            const billsContainer = document.getElementById("recent-bills-container");
            billsContainer.innerHTML = "";
            
            if (filteredBills.length === 0) {
                billsContainer.innerHTML = `<div style="color:#aaa; text-align:center; padding:10px;">Tháng này chưa phát sinh hóa đơn</div>`;
            } else {
                filteredBills.forEach(bill => {
                    const div = document.createElement("div"); div.className = "bill-item";
                    let itemsDetailHTML = bill.orderList.map(i => `• ${i.name}${i.isTakeAway?' (Mang đi)':''} x${i.qty} - ${(i.price*i.qty).toLocaleString('vi-VN')}đ`).join('<br>');
                    
                    div.innerHTML = `
                        <div class="bill-header">
                            <span>Bàn ${bill.tableId} <small style="color:#666; font-weight:normal;">(${bill.date.replace(/-/g, '/')} ${bill.time})</small></span>
                            <button class="btn-undo" onclick="undoCheckout('${bill.id}')">Hủy</button>
                        </div>
                        <div class="bill-details">
                            ${itemsDetailHTML}
                            <div style="text-align:right; font-weight:bold; color:var(--danger-color); margin-top:4px;">Tổng: ${bill.total.toLocaleString('vi-VN')}đ</div>
                        </div>
                    `;
                    billsContainer.appendChild(div);
                });
            }

            // 4. Đổ danh sách doanh thu tổng theo từng ngày trong tháng đó
            const historyContainer = document.getElementById("history-container");
            historyContainer.innerHTML = "";
            
            const sortedDates = Object.keys(revenueHistory).sort((a, b) => {
                const pA = a.split('-'); const pB = b.split('-');
                return new Date(pB[2], pB[1] - 1, pB[0]) - new Date(pA[2], pA[1] - 1, pA[0]);
            });

            let hasHistory = false;
            sortedDates.forEach(date => {
                let parts = date.split('-');
                if (`${parts[1]}-${parts[2]}` === targetMonthYear) {
                    hasHistory = true;
                    const div = document.createElement("div"); div.className = "history-item";
                    div.innerHTML = `<span>📅 Ngày <strong>${date.replace(/-/g, '/')}</strong> ${date === todayStr ? '<small style="color:var(--active-color)">(Hôm nay)</small>' : ''}</span>
                                     <span style="font-weight:bold; color:var(--primary-color);">${revenueHistory[date].toLocaleString('vi-VN')}đ</span>`;
                    historyContainer.appendChild(div);
                }
            });
            if (!hasHistory) {
                historyContainer.innerHTML = `<div style="color:#aaa; text-align:center;">Chưa có lịch sử doanh thu ngày</div>`;
            }
        }

        function onMonthFilterChange() {
            renderFilteredStats();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-tab-view'));
            document.querySelectorAll('.tab-nav-btn').forEach(el => el.classList.remove('active-tab-nav'));
            
            if (tabName === 'pos') {
                document.getElementById('tab-pos').classList.add('active-tab-view');
                document.getElementById('nav-pos').classList.add('active-tab-nav');
            } else {
                document.getElementById('tab-stats').classList.add('active-tab-view');
                document.getElementById('nav-stats').classList.add('active-tab-nav');
                renderFilteredStats();
            }
        }

        function renderTables() {
            const container = document.getElementById("tables-container"); container.innerHTML = "";
            for (let i = 1; i <= 25; i++) {
                const btn = document.createElement("button");
                btn.className = "table-btn"; btn.id = `table-${i}`;
                if (tables[i] && tables[i].orderList && tables[i].orderList.length > 0) {
                    btn.classList.add("active-table");
                    btn.innerHTML = `<div>Bàn ${i}</div><small style="font-size:0.7rem;">Có khách</small>`;
                } else {
                    btn.innerHTML = `<div>Bàn ${i}</div><small style="color:#aaa; font-size:0.7rem;">Trống</small>`;
                }
                if (currentTableId == i) btn.classList.add("selected-now");
                btn.onclick = () => selectTable(i);
                container.appendChild(btn);
            }
        }

        function initMenuSelect() {
            const select = document.getElementById("menu-select"); select.innerHTML = "";
            menuData.forEach(cat => {
                const group = document.createElement("optgroup"); group.label = cat.category;
                cat.items.forEach(item => {
                    const opt = document.createElement("option"); opt.value = JSON.stringify(item);
                    opt.textContent = `${item.name} - ${(item.price/1000)}k`;
                    group.appendChild(opt);
                });
                select.appendChild(group);
            });
        }

        function updateRevenueDisplay() {
            document.getElementById("daily-revenue").textContent = (revenueHistory[todayStr] || 0).toLocaleString('vi-VN');
        }

        function selectTable(tableId) {
            currentTableId = tableId;
            document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('selected-now'));
            if (document.getElementById(`table-${tableId}`)) document.getElementById(`table-${tableId}`).classList.add('selected-now');
            document.getElementById("order-title").textContent = `Đang chọn: BÀN ${tableId}`;
            document.getElementById("order-controls").style.display = "block";
            renderOrderList();

            if (window.innerWidth <= 768) {
                document.getElementById("order-section-panel").scrollIntoView({ behavior: 'smooth' });
            }
        }

        function renderOrderList() {
            const listContainer = document.getElementById("current-order-list"); listContainer.innerHTML = "";
            if (!currentTableId || !tables[currentTableId]) return;
            const currentOrder = tables[currentTableId].orderList || []; let total = 0;
            currentOrder.forEach((item, index) => {
                const itemTotal = item.price * item.qty; total += itemTotal;
                const div = document.createElement("div"); div.className = "order-item";
                div.innerHTML = `<div><strong>${item.name}${item.isTakeAway ? '<span class="badge-takeaway">Mang đi</span>' : ''}</strong><br><small style="color:#666">${item.price.toLocaleString('vi-VN')}đ</small></div>
                    <div class="item-controls">
                        <button class="btn-qty" onclick="changeQty(${index}, -1)">-</button><span>${item.qty}</span><button class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
                        <span style="font-weight:bold; margin-left:10px;">${itemTotal.toLocaleString('vi-VN')}đ</span>
                    </div>`;
                listContainer.appendChild(div);
            });
            document.getElementById("table-total").textContent = total.toLocaleString('vi-VN');
        }

        function toggleCheckbox(e) { if (e.target.tagName !== 'INPUT') { const cb = document.getElementById("takeaway-checkbox"); cb.checked = !cb.checked; } }

        function addItemToTable() {
            if (!currentTableId) return;
            const select = document.getElementById("menu-select"); const itemInfo = JSON.parse(select.value);
            const isTakeAway = document.getElementById("takeaway-checkbox").checked;
            
            if (!tables[currentTableId].orderList) tables[currentTableId].orderList = [];
            const currentOrder = tables[currentTableId].orderList;
            const existingItem = currentOrder.find(i => i.id === itemInfo.id && (i.isTakeAway || false) === isTakeAway);
            
            if (existingItem) { existingItem.qty += 1; } else { currentOrder.push({ id: itemInfo.id, name: itemInfo.name, price: itemInfo.price, qty: 1, isTakeAway: isTakeAway }); }
            document.getElementById("takeaway-checkbox").checked = false;
            
            renderOrderList();
            pushDataToCloud(); 
        }

        function changeQty(index, change) {
            const currentOrder = tables[currentTableId].orderList; currentOrder[index].qty += change;
            if (currentOrder[index].qty <= 0) currentOrder.splice(index, 1);
            
            renderOrderList();
            pushDataToCloud(); 
        }

        function checkoutTable() {
            if (!currentTableId) return;
            const currentOrder = tables[currentTableId].orderList;
            if (!currentOrder || currentOrder.length === 0) { alert("Bàn này trống!"); return; }
            let total = currentOrder.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            if (confirm(`Xác nhận thanh toán Bàn ${currentTableId}\nTổng: ${total.toLocaleString('vi-VN')}đ?`)) {
                const activeTodayStr = getTodayString(); const now = new Date();
                const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                recentBills.unshift({
                    id: 'bill_' + Date.now(), tableId: currentTableId, total: total, time: timeStr, date: activeTodayStr,
                    orderList: JSON.parse(JSON.stringify(currentOrder))
                });

                revenueHistory[activeTodayStr] = (revenueHistory[activeTodayStr] || 0) + total;
                tables[currentTableId].orderList = [];
                
                document.getElementById("order-title").textContent = "Vui lòng chọn bàn...";
                document.getElementById("order-controls").style.display = "none";
                currentTableId = null;

                pushDataToCloud(); 
            }
        }

        function undoCheckout(billId) {
            const billIndex = recentBills.findIndex(b => b.id === billId); if (billIndex === -1) return;
            const bill = recentBills[billIndex];
            if (confirm(`HỦY hóa đơn nhầm lẫn này của BÀN ${bill.tableId}?`)) {
                if (revenueHistory[bill.date]) { revenueHistory[bill.date] -= bill.total; if (revenueHistory[bill.date] < 0) revenueHistory[bill.date] = 0; }
                
                if (!tables[bill.tableId].orderList) tables[bill.tableId].orderList = [];
                bill.orderList.forEach(oldItem => {
                    const existing = tables[bill.tableId].orderList.find(i => i.id === oldItem.id && (i.isTakeAway || false) === (oldItem.isTakeAway || false));
                    if (existing) existing.qty += oldItem.qty; else tables[bill.tableId].orderList.push(oldItem);
                });
                recentBills.splice(billIndex, 1);
                
                if (currentTableId === bill.tableId) renderOrderList();
                pushDataToCloud(); 
                alert(`Đã hoàn tác thành công!`);
            }
        }

        // CHỨC NĂNG IN BÁO CÁO THÔNG MINH THEO THÁNG ĐANG LỌC
        function printFilteredReport() {
            const targetMonthYear = document.getElementById("report-month-select").value;
            if (!targetMonthYear) return;

            let filteredBills = recentBills.filter(bill => {
                if (!bill.date) return false;
                let parts = bill.date.split('-');
                return `${parts[1]}-${parts[2]}` === targetMonthYear;
            });

            if (filteredBills.length === 0) {
                alert("Khoảng thời gian này chưa có dữ liệu hóa đơn để in báo cáo!");
                return;
            }

            let reportWindow = window.open('', '_blank');
            let billsHTML = filteredBills.map((bill) => {
                let itemsText = bill.orderList.map(i => `  + ${i.name}${i.isTakeAway?'(MĐ)':''} x${i.qty} - ${(i.price*i.qty).toLocaleString('vi-VN')}đ`).join('<br>');
                return `
                    <div style="margin-bottom: 10px; border-bottom: 1px dashed #ccc; padding-bottom: 6px;">
                        <strong>Bàn ${bill.tableId} (${bill.date.replace(/-/g, '/')} ${bill.time})</strong><br>
                        ${itemsText}<br>
                        <div style="text-align: right;">Tiền bàn: <strong>${bill.total.toLocaleString('vi-VN')}đ</strong></div>
                    </div>
                `;
            }).join('');

            reportWindow.document.write(`
                <html>
                <head>
                    <title>Báo Cáo TINO COFFEE - Tháng ${targetMonthYear.replace('-', '/')}</title>
                    <style>
                        body { font-family: 'Courier New', Courier, monospace; padding: 15px; color: #000; font-size: 13px; max-width: 360px; margin: 0 auto; }
                        h2, h3 { text-align: center; margin: 5px 0; }
                        .text-center { text-align: center; }
                        .hr-double { border-top: 3px double #000; margin: 10px 0; }
                        .total-summary { font-size: 15px; font-weight: bold; margin-top: 10px; border-top: 1px solid #000; padding-top: 5px; }
                    </style>
                </head>
                <body>
                    <h2>TINO COFFEE</h2>
                    <h3>BÁO CÁO DOANH THU THÁNG</h3>
                    <p class="text-center">Kỳ đối soát: Tháng ${targetMonthYear.replace('-', '/')}</p>
                    <div class="hr-double"></div>
                    <p>Tổng số lượng bàn phục vụ: <strong>${filteredBills.length} bàn</strong></p>
                    <p class="total-summary">TỔNG DOANH THU THÁNG: ${document.getElementById("month-total-money").textContent}đ</p>
                    <div class="hr-double"></div>
                    <h4>CHI TIẾT DANH SÁCH HÓA ĐƠN:</h4>
                    ${billsHTML}
                    <p class="text-center" style="margin-top: 25px;">-- HẾT BÁO CÁO THÁNG TINO --</p>
                    <script>
                        setTimeout(() => { window.print(); window.close(); }, 300);
                    <\/script>
                </body>
                </html>
            `);
            reportWindow.document.close();
        }
    </script>
</body>
</html>
