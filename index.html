<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINO COFFEE - Quản Lý Quán</title>
    <style>
        :root {
            --primary-color: #6F4E37;
            --secondary-color: #ECE0D1;
            --dark-color: #3D2314;
            --success-color: #2ec4b6;
            --danger-color: #e71d36;
            --active-color: #ff9f1c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f7f5f0;
            color: var(--dark-color);
            padding: 10px;
        }

        header {
            text-align: center;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .revenue-box {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 8px;
            border-radius: 5px;
            margin-top: 8px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Danh sách bàn */
        .tables-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .table-btn {
            aspect-ratio: 1;
            border: 2px solid #ddd;
            background-color: #fff;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .table-btn.active-table {
            background-color: var(--active-color);
            color: white;
            border-color: var(--active-color);
        }

        .table-btn.selected-now {
            border: 3px solid var(--dark-color);
            transform: scale(1.05);
        }

        /* Khu vực order */
        .order-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .menu-selector {
            margin-bottom: 15px;
        }

        .takeaway-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
            padding: 5px;
            background-color: #fff5e6;
            border-radius: 6px;
            border: 1px dashed var(--active-color);
            cursor: pointer;
        }
